[build]
  publish = "."

# Disable pretty URLs so /blog/article.html links work and aren't stripped to /blog/article
[build.processing]
  skip_processing = false

[build.processing.html]
  pretty_urls = false

# Serve blog posts without .html extension (/blog/my-article -> /blog/my-article.html)
[[redirects]]
  from = "/blog/:slug"
  to = "/blog/:slug.html"
  status = 200

[[redirects]]
  from = "/calculator"
  to = "/calculator/index.html"
  status = 200

[[redirects]]
  from = "/intake"
  to = "/intake/index.html"
  status = 200

[[redirects]]
  from = "/audit"
  to = "/audit/index.html"
  status = 200

[[redirects]]
  from = "/scorecard"
  to = "/scorecard/index.html"
  status = 200

[[redirects]]
  from = "/resume"
  to = "/resume.html"
  status = 200
